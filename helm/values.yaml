namespace: production
environment: production
pciScope: true

replicaCount: 3

image:
  repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/payment-service
  tag: "2.4.1"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Security context applied to all containers in this chart.
# See: Security Policy §3.1 — production containers must have readOnlyRootFilesystem: true
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

env:
  - name: ENV
    value: production
  - name: DB_HOST
    valueFrom:
      secretKeyRef:
        name: payment-db-secret
        key: host
  - name: DB_PORT
    value: "5432"

livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
